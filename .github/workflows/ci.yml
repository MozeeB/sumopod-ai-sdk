name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run JVM tests
        run: ./gradlew :library:jvmTest --no-daemon

      - name: Run Android host tests
        run: ./gradlew :library:testAndroidHostTest --no-daemon

      - name: Run sample unit tests
        run: ./gradlew :sample:testDebugUnitTest --no-daemon

      - name: Compile iOS targets
        run: ./gradlew :library:compileKotlinIosArm64 :library:compileKotlinIosSimulatorArm64 --no-daemon

      - name: Build Android sample APK
        run: ./gradlew :sample:assembleDebug --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            library/build/reports/tests/
            library/build/test-results/
            sample/build/reports/tests/
            sample/build/test-results/
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-debug-apk
          path: sample/build/outputs/apk/debug/sample-debug.apk
          retention-days: 14
